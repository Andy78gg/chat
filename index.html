<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最终通电测试聊天室</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f3; }
        .chat-container { width: 450px; height: 650px; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #07c160; color: white; padding: 15px; font-weight: bold; text-align: center; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f8f9fa; }
        .message { padding: 10px 14px; border-radius: 12px; font-size: 14px; background: #07c160; color: white; align-self: flex-end; }
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 0 20px; background: #07c160; color: white; border: none; border-radius: 8px; margin-left: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">多人在线聊天室 (本地测试)</div>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息...">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <!-- 100% 正确的库网址 -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB4e4FOw71XX155mFadqpOxn7hSH7BNWYg", 
            authDomain: "://firebaseapp.com", 
            databaseURL: "https://firebaseio.com", 
            projectId: "my-chat-room-83418", 
            storageBucket: "my-chat-room-83418.firebasestorage.app", 
            messagingSenderId: "694895631506", 
            appId: "1:694895631506:web:f968e207341b6d6730da4b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messagesRef = db.ref('chat_messages');

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (!text) return;
            messagesRef.push({ username: "测试用户", text: text, timestamp: Date.now() });
            userInput.value = '';
        });

        messagesRef.on('child_added', (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.innerText = data.text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
